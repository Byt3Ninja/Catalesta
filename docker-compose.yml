# Catalesta local development stack (docs/13-devops.md).
# Bring up: docker compose up -d --build
# API:   http://localhost:8080        Web: http://localhost:3000
# MinIO: http://localhost:9001        Mail: http://localhost:8025

services:
  nginx:
    image: nginx:alpine
    depends_on:
      - laravel-api
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  laravel-api:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment: &laravel_env
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: catalesta
      DB_USERNAME: postgres
      DB_PASSWORD: password
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: catalesta
      AWS_ENDPOINT: http://minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      OIDC_ISSUER: http://startup-gate-mock:8080
      PROFILE_API_BASE_URL: http://startup-gate-mock:8080/sg/api/v1
    volumes:
      - ./backend:/var/www/html

  queue-worker:
    build: ./backend
    depends_on:
      - laravel-api
      - redis
    environment: *laravel_env
    volumes:
      - ./backend:/var/www/html
    command: php artisan queue:work --tries=3 --timeout=90

  scheduler:
    build: ./backend
    depends_on:
      - laravel-api
    environment: *laravel_env
    volumes:
      - ./backend:/var/www/html
    command: php artisan schedule:work

  react-web:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: catalesta
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-setup:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 minioadmin minioadmin) do sleep 1; done;
      mc mb --ignore-existing local/catalesta;
      exit 0;
      "

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  startup-gate-mock:
    # Runs the same Laravel image as laravel-api but in APP_ROLE=mock mode.
    # MockKeys generates and caches an RS256 keypair per process — artisan serve
    # is a single process so the keypair is consistent across all requests.
    # For a multi-worker setup (php-fpm), set SG_MOCK_PRIVATE_KEY and
    # SG_MOCK_PUBLIC_KEY (from `php artisan sg-mock:keys`) so all workers share
    # one signing key; artisan serve avoids that need.
    build: ./backend
    command: php artisan serve --host=0.0.0.0 --port=8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      APP_ROLE: mock
      APP_ENV: local
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: catalesta
      DB_USERNAME: postgres
      DB_PASSWORD: password
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      OIDC_ISSUER: http://startup-gate-mock:8080
    ports:
      - "8081:8080"
    volumes:
      - ./backend:/var/www/html

volumes:
  postgres-data:
  minio-data:
