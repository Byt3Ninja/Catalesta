name: CI

on:
  push:
    branches: [main]
  pull_request:

# Pipeline mirrors docs/06-devops.md.
jobs:
  backend:
    name: Backend (lint, analyse, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, bcmath, intl, zip, redis
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Lint (Pint)
        run: ./vendor/bin/pint --test

      - name: Static analysis (PHPStan)
        run: ./vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: Unit & feature tests
        run: php artisan test

  frontend:
    name: Frontend (typecheck, lint, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (ESLint)
        run: npm run lint

      - name: Tests (Vitest)
        run: npm run test

  containers:
    name: Build & smoke-test containers
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Boot data + mock services
        run: docker compose up -d postgres redis minio minio-setup mailpit startup-gate-mock

      - name: Wait for and verify mock identity service
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8081/health; then echo " mock OK"; exit 0; fi
            sleep 2
          done
          echo "mock service did not become healthy"; docker compose logs startup-gate-mock; exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v

  contract:
    name: Contract (OpenAPI lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Lint OpenAPI spec (Spectral)
        run: npx --yes @stoplight/spectral-cli lint backend/openapi/openapi.json --ruleset .spectral.yaml --fail-severity=error

  security:
    name: Security scan (dependencies + filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, bcmath, intl, zip, redis
          coverage: none

      - name: Composer audit (backend)
        working-directory: backend
        run: |
          composer install --no-interaction --prefer-dist --no-progress
          composer audit

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit (frontend)
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      # Only defined so Compose can interpolate the startup-gate-mock service;
      # react-web does not consume it.
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
    steps:
      - uses: actions/checkout@v4

      - name: Build & start web
        run: |
          docker compose build react-web
          docker compose up -d react-web

      - name: Wait for web
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 >/dev/null; then echo "web OK"; exit 0; fi
            sleep 2
          done
          echo "web did not become ready"; docker compose logs react-web; exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:3000
        run: npm run test:e2e

      - name: Tear down
        if: always()
        run: docker compose down -v
